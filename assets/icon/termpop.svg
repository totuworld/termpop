<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2C313A"/>
      <stop offset="100%" style="stop-color:#21252B"/>
    </linearGradient>
    <linearGradient id="popup" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3E4451"/>
      <stop offset="100%" style="stop-color:#2C313A"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="32" y="32" width="960" height="960" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Terminal window -->
  <rect x="140" y="160" width="744" height="480" rx="16" ry="16" fill="#282C34" stroke="#3E4451" stroke-width="3"/>

  <!-- Title bar -->
  <rect x="140" y="160" width="744" height="48" rx="16" ry="16" fill="#21252B"/>
  <rect x="140" y="192" width="744" height="16" fill="#21252B"/>

  <!-- Traffic lights -->
  <circle cx="180" cy="184" r="10" fill="#E06C75"/>
  <circle cx="212" cy="184" r="10" fill="#E5C07B"/>
  <circle cx="244" cy="184" r="10" fill="#98C379"/>

  <!-- Terminal prompt lines -->
  <text x="172" y="260" font-family="monospace" font-size="28" fill="#61AFEF">❯</text>
  <rect x="200" y="244" width="180" height="4" rx="2" fill="#ABB2BF" opacity="0.5"/>

  <text x="172" y="300" font-family="monospace" font-size="28" fill="#61AFEF">❯</text>
  <rect x="200" y="284" width="120" height="4" rx="2" fill="#ABB2BF" opacity="0.3"/>

  <text x="172" y="340" font-family="monospace" font-size="28" fill="#61AFEF">❯</text>
  <rect x="200" y="324" width="240" height="4" rx="2" fill="#ABB2BF" opacity="0.2"/>

  <!-- Cursor blink -->
  <rect x="200" y="360" width="14" height="24" rx="2" fill="#528BFF" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Popup window (floating above terminal) -->
  <g filter="url(#shadow)">
    <rect x="280" y="420" width="560" height="340" rx="20" ry="20" fill="url(#popup)" stroke="#528BFF" stroke-width="3"/>

    <!-- Popup title bar -->
    <rect x="280" y="420" width="560" height="44" rx="20" ry="20" fill="#528BFF" opacity="0.15"/>
    <rect x="280" y="448" width="560" height="16" fill="#528BFF" opacity="0.15"/>
    <text x="512" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#ABB2BF" text-anchor="middle" font-weight="600">termpop</text>

    <!-- Popup text lines -->
    <rect x="316" y="488" width="280" height="5" rx="2.5" fill="#E5C07B" opacity="0.8"/>
    <rect x="316" y="512" width="380" height="5" rx="2.5" fill="#ABB2BF" opacity="0.6"/>
    <rect x="316" y="536" width="200" height="5" rx="2.5" fill="#98C379" opacity="0.7"/>
    <rect x="316" y="560" width="320" height="5" rx="2.5" fill="#ABB2BF" opacity="0.5"/>
    <rect x="316" y="584" width="160" height="5" rx="2.5" fill="#E06C75" opacity="0.6"/>

    <!-- Popup cursor -->
    <rect x="316" y="610" width="12" height="20" rx="2" fill="#528BFF" filter="url(#glow)">
      <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
    </rect>

    <!-- Submit hint -->
    <g opacity="0.5">
      <rect x="540" y="714" width="120" height="28" rx="6" fill="#528BFF" opacity="0.2"/>
      <text x="600" y="733" font-family="system-ui, sans-serif" font-size="14" fill="#ABB2BF" text-anchor="middle">⌘+Enter</text>

      <rect x="670" y="714" width="80" height="28" rx="6" fill="#3E4451" opacity="0.5"/>
      <text x="710" y="733" font-family="system-ui, sans-serif" font-size="14" fill="#ABB2BF" text-anchor="middle">Esc</text>
    </g>
  </g>

  <!-- Up arrow indicating popup -->
  <path d="M508 410 L522 390 L536 410" stroke="#528BFF" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
</svg>
